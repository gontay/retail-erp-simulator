<!DOCTYPE html>
<html>
<head>
    <title>Retail ERP Prototype</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        nav a {
            margin-right: 15px;
        }
        .success { color: green; }
        .error { color: red; }
        input, select, textarea {
            display: block;
            margin-bottom: 10px;
            padding: 8px;
            width: 350px;
        }
        button {
            padding: 10px 16px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/partners/new">Business Partners</a>
        <a href="/inventory/new">Inventory</a>
        <a href="/sales/new">Sales</a>
        <a href="/purchases/new">Purchases</a>
        <a href="/assets/new">Assets</a>
        <a href="/seed/">Seed</a>
    </nav>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
