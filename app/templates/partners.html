{% extends "base.html" %}
{% block content %}
<h1>Create Business Partner</h1>

<form method="post">
    <input name="partner_code" placeholder="Partner Code" required>
    <input name="name" placeholder="Name" required>
    <input name="partner_type" placeholder="Partner Type (Individual / Company)" required>
    <input name="email" placeholder="Email">
    <input name="phone" placeholder="Phone">
    <textarea name="address" placeholder="Address"></textarea>

    <label><input type="checkbox" name="is_customer"> Customer</label>
    <label><input type="checkbox" name="is_supplier"> Supplier</label>
    <label><input type="checkbox" name="is_tenant"> Tenant</label>

    <br><br>
    <button type="submit">Create Business Partner</button>
</form>

{% if message %}<p class="success">{{ message }}</p>{% endif %}
{% if error %}<p class="error">{{ error }}</p>{% endif %}
{% endblock %}
