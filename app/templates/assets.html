{% extends "base.html" %}
{% block content %}
<h1>Create Asset</h1>

<form method="post" action="/assets/new">
    <input name="asset_code" placeholder="Asset Code" required>
    <input name="asset_name" placeholder="Asset Name" required>
    <input name="category" placeholder="Category" required>
    <input type="date" name="acquisition_date" required>
    <input type="number" step="0.01" name="acquisition_cost" placeholder="Acquisition Cost" required>
    <input type="number" name="useful_life_months" placeholder="Useful Life (Months)" required>
    <input type="number" step="0.01" name="salvage_value" placeholder="Salvage Value" value="0">

    <label>Payment Method</label>
    <select name="payment_method" required>
        <option value="cash">Cash</option>
        <option value="credit">Credit</option>
    </select>

    <label>Supplier (optional)</label>
    <select name="supplier_id">
        <option value="">-- None --</option>
        {% for s in suppliers %}
            <option value="{{ s.id }}">{{ s.business_partner.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Create Asset</button>
</form>

<hr>

<h2>Post Depreciation</h2>
<form method="post" action="/assets/depreciate">
    <select name="asset_id" required>
        {% for a in assets %}
            <option value="{{ a.id }}">{{ a.asset_code }} - {{ a.asset_name }}</option>
        {% endfor %}
    </select>

    <input type="date" name="depreciation_date" required>

    <button type="submit">Post Depreciation</button>
</form>

{% if message %}<p class="success">{{ message }}</p>{% endif %}
{% if error %}<p class="error">{{ error }}</p>{% endif %}
{% endblock %}
