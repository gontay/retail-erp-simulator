{% extends "base.html" %}
{% block content %}
<h1>Create Inventory Item</h1>

<form method="post">
    <input name="sku" placeholder="SKU" required>
    <input name="product_name" placeholder="Product Name" required>
    <input name="category" placeholder="Category" required>
    <input name="unit_price" type="number" step="0.01" placeholder="Unit Price" required>
    <input name="unit_cost" type="number" step="0.01" placeholder="Unit Cost" required>
    <input name="quantity_on_hand" type="number" step="0.01" placeholder="Opening Quantity" required>

    <button type="submit">Create Inventory</button>
</form>

{% if message %}<p class="success">{{ message }}</p>{% endif %}
{% if error %}<p class="error">{{ error }}</p>{% endif %}
{% endblock %}
